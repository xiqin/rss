# Node.js + Express 示例配置

## 项目信息

```yaml
project:
  name: "my-node-app"
  language: "TypeScript 5.x"
  framework: "Express 4.x"
  orm: "Prisma"
  database: "PostgreSQL"
  cache: "Redis"
  logging: "Winston"
  di: "Awilix"
```

## 目录结构

```
src/
  api/               # API 路由
    routes/          # 路由定义
    middlewares/     # 中间件
    validators/      # 请求验证
  config/            # 配置
  controllers/       # 控制器
  services/          # 业务逻辑
  repositories/      # 数据访问
  models/            # 数据模型
  utils/             # 工具函数
  types/             # TypeScript 类型
prisma/              # Prisma 配置
  schema.prisma      # 数据库 Schema
tests/               # 测试
index.ts             # 入口
```

## 编码红线

1. 禁止在 Controller 中写业务逻辑（必须在 services/）
2. 禁止使用 `console.log()`（必须用 logger）
3. 禁止硬编码配置值
4. 禁止 SQL 字符串拼接（必须用 ORM）
5. 禁止捕获通用异常后静默吞掉
6. 禁止使用 `any` 类型

## 开发命令

```bash
# 启动开发服务器
npm run dev

# 测试
npm test

# 代码检查
npm run lint

# 类型检查
npm run type-check

# 数据库迁移
npx prisma migrate dev
```

## 依赖注入

```typescript
import { asClass, createContainer } from 'awilix';

const container = createContainer();

container.register({
  userService: asClass(UserService).singleton(),
  userRepository: asClass(UserRepository).singleton(),
});
```

## 响应格式

```typescript
interface ApiResponse<T> {
  code: number;
  message: string;
  data: T | null;
}

const success = <T>(data: T): ApiResponse<T> => ({
  code: 0,
  message: 'success',
  data,
});

const error = (code: number, message: string): ApiResponse<null> => ({
  code,
  message,
  data: null,
});
```

## 错误处理

```typescript
import { Request, Response, NextFunction } from 'express';

class AppError extends Error {
  constructor(
    public statusCode: number,
    public message: string,
  ) {
    super(message);
  }
}

const errorHandler = (
  err: Error,
  req: Request,
  res: Response,
  next: NextFunction,
) => {
  if (err instanceof AppError) {
    return res.status(err.statusCode).json({
      code: err.statusCode,
      message: err.message,
      data: null,
    });
  }
  // 未知错误
  logger.error('Unhandled error:', err);
  return res.status(500).json({
    code: 500,
    message: 'Internal server error',
    data: null,
  });
};
```
