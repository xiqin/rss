# Python + FastAPI 示例配置

## 项目信息

```yaml
project:
  name: "my-python-app"
  language: "Python 3.12"
  framework: "FastAPI"
  orm: "SQLAlchemy"
  database: "PostgreSQL"
  cache: "Redis"
  logging: "Loguru"
  di: "FastAPI Depends"
```

## 目录结构

```
app/
  api/               # API 路由
    v1/              # API 版本
      endpoints/     # 路由端点
    deps.py          # 依赖注入
  core/              # 核心配置
    config.py        # 配置
    security.py      # 安全相关
  db/                # 数据库
    session.py       # 会话管理
    base_class.py    # 基础模型
  models/            # 数据模型
  schemas/           # Pydantic schemas
  services/          # 业务逻辑
  utils/             # 工具函数
tests/               # 测试
main.py              # 入口
```

## 编码红线

1. 禁止在路由端点中写业务逻辑（必须在 services/）
2. 禁止使用 `print()`（必须用 logger）
3. 禁止硬编码配置值
4. 禁止 SQL 字符串拼接（必须用参数化）
5. 禁止捕获通用异常后静默吞掉

## 开发命令

```bash
# 启动开发服务器
uvicorn main:app --reload

# 测试
pytest tests/ -v

# 代码检查
ruff check app/

# 类型检查
mypy app/
```

## 依赖注入

```python
from fastapi import Depends

def get_db():
    db = SessionLocal()
    try:
        yield db
    finally:
        db.close()

@router.get("/items/")
def read_items(db: Session = Depends(get_db)):
    return db.query(Item).all()
```

## 响应格式

```python
from pydantic import BaseModel

class Response(BaseModel):
    code: int = 0
    message: str = "success"
    data: Any = None
```

## 错误处理

```python
from fastapi import HTTPException

raise HTTPException(status_code=400, detail="Invalid input")
```
